<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Permainan Tebak Kartu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            touch-action: manipulation;
        }
        .card-container {
            perspective: 1000px;
            will-change: transform;
        }
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        .card-container.flipped .card-inner {
            transform: rotateY(180deg);
        }
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0.5rem;
        }
        .card-front {
            background: linear-gradient(135deg, #6B7280, #374151);
            border: 2px solid #9CA3AF;
        }
        .card-back {
            background-color: #F3F4F6;
            color: #1F2937;
            transform: rotateY(180deg);
            font-size: 2.5rem;
            font-weight: bold;
        }
        #secret-button {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100px;
            height: 100px;
            opacity: 0;
            cursor: pointer;
            z-index: 999;
        }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center justify-center p-4">

    <div id="secret-button" title="Tombol Rahasia"></div>

    <div class="w-full max-w-4xl mx-auto text-center">
        <h1 class="text-3xl md:text-4xl font-bold mb-2">Permainan Kartu Digital</h1>
        <p id="instructions" class="text-gray-300 mb-6 text-lg h-12">Silakan minta temanmu untuk memilih satu kartu dan mengingatnya.</p>

        <div id="card-grid" class="grid grid-cols-4 sm:grid-cols-5 md:grid-cols-6 lg:grid-cols-7 gap-3 md:gap-4 mb-6">
            <!-- Kartu akan dibuat oleh JavaScript -->
        </div>

        <button id="reset-button" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg transition-colors">
            Mulai Ulang
        </button>
    </div>

    <script>
        const cardGrid = document.getElementById('card-grid');
        const instructions = document.getElementById('instructions');
        const resetButton = document.getElementById('reset-button');
        const secretButton = document.getElementById('secret-button');

        const cardSymbols = ['♠', '♥', '♦', '♣', '★', '☀', '☾', '⚡', '☺', '⚓', '⚛', '♛', '♞', '⚅', '⌘', '☘', '❄', '♪'];
        let cards = [];
        let chosenCardValue = null;
        let isCardChosen = false;
        let secretModeActive = false;
        let forcedCardId = null; 

        // Sound effects
        let audioInitialized = false;
        let flipSynth, clickSynth, shuffleSynth;

        async function initializeAudio() {
            if (audioInitialized) return;
            await Tone.start();
            flipSynth = new Tone.Synth({ volume: -6, oscillator: { type: 'sine' }, envelope: { attack: 0.005, decay: 0.1, sustain: 0.0, release: 0.1 } }).toDestination();
            clickSynth = new Tone.Synth({ volume: -10, oscillator: { type: 'sine' }, envelope: { attack: 0.005, decay: 0.1, sustain: 0.0, release: 0.1 } }).toDestination();
            shuffleSynth = new Tone.NoiseSynth({ volume: -20, noise: { type: 'white' }, envelope: { attack: 0.005, decay: 0.15, sustain: 0 } }).toDestination();
            audioInitialized = true;
            console.log('Audio context started');
        }

        document.body.addEventListener('click', initializeAudio, { once: true });
        
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function initializeGame() {
            cardGrid.innerHTML = '';
            cards = [];
            chosenCardValue = null;
            isCardChosen = false;
            secretModeActive = false;
            forcedCardId = null;
            instructions.textContent = 'Silakan minta temanmu untuk memilih satu kartu dan mengingatnya.';
            cardGrid.style.pointerEvents = 'auto';

            const shuffledSymbols = shuffle([...cardSymbols]).slice(0, 14);

            shuffledSymbols.forEach((symbol, index) => {
                const cardContainer = document.createElement('div');
                cardContainer.className = 'card-container h-28 md:h-32 cursor-pointer';
                cardContainer.innerHTML = `<div class="card-inner"><div class="card-front"></div><div class="card-back">${symbol}</div></div>`;
                const cardData = { id: index, value: symbol, element: cardContainer };
                cards.push(cardData);
                cardGrid.appendChild(cardContainer);
                cardContainer.addEventListener('click', () => handleCardClick(cardData));
            });
        }

        async function shuffleAnimation() {
            if (audioInitialized) shuffleSynth.triggerAttackRelease("8n");
            instructions.textContent = 'Mengacak kartu...';
            cardGrid.style.pointerEvents = 'none';
            const positions = cards.map(card => card.element.getBoundingClientRect());
            for (let i = cardGrid.children.length; i >= 0; i--) {
                cardGrid.appendChild(cardGrid.children[Math.random() * i | 0]);
            }
            cards.forEach((card, i) => {
                const newPos = card.element.getBoundingClientRect();
                const oldPos = positions[i];
                const deltaX = oldPos.left - newPos.left;
                const deltaY = oldPos.top - newPos.top;
                if (deltaX !== 0 || deltaY !== 0) {
                    card.element.style.transform = `translate(${deltaX}px, ${deltaY}px)`;
                    card.element.style.transition = 'transform 0s';
                }
            });
            await new Promise(resolve => requestAnimationFrame(resolve));
            cards.forEach(card => {
                card.element.style.transform = '';
                card.element.style.transition = 'transform 0.6s ease-in-out';
            });
            setTimeout(() => {
                cardGrid.style.pointerEvents = 'auto';
                instructions.textContent = 'Kartu telah diacak. Coba tebak di mana kartunya!';
                cards.forEach(card => card.element.style.transition = '');
            }, 600);
        }

        function handleCardClick(clickedCard) {
            if (cardGrid.style.pointerEvents === 'none') return;
            if (audioInitialized) flipSynth.triggerAttackRelease("C5", "16n");

            if (!isCardChosen) {
                chosenCardValue = clickedCard.value;
                isCardChosen = true;
                const cardEl = clickedCard.element;
                cardEl.classList.add('flipped');
                instructions.textContent = 'Kartu diingat. Sekarang, mari kita acak...';
                setTimeout(() => {
                    cardEl.classList.remove('flipped');
                    setTimeout(() => shuffleAnimation(), 600);
                }, 2000);
                return;
            }

            const targetElement = clickedCard.element;
            const cardBack = targetElement.querySelector('.card-back');

            if (targetElement.classList.contains('flipped')) {
                if (clickedCard.id === forcedCardId) forcedCardId = null;
                targetElement.classList.remove('flipped');
                return;
            }
            
            if (secretModeActive) {
                cardBack.textContent = chosenCardValue;
                forcedCardId = clickedCard.id;
            } else {
                 cardBack.textContent = clickedCard.value;
            }
            targetElement.classList.add('flipped');
        }

        function toggleSecretMode() {
            if (!isCardChosen) return;
            
            const wasActive = secretModeActive;
            secretModeActive = !secretModeActive;
            console.log('Mode Rahasia:', secretModeActive ? 'AKTIF' : 'NONAKTIF');

            if (wasActive && forcedCardId !== null) {
                const forcedCard = cards.find(c => c.id === forcedCardId);
                const originalAudienceCard = cards.find(c => c.value === chosenCardValue);
                if (forcedCard && originalAudienceCard && forcedCard.id !== originalAudienceCard.id) {
                    const tempValue = forcedCard.value;
                    forcedCard.value = originalAudienceCard.value;
                    originalAudienceCard.value = tempValue;
                    console.log('Nilai kartu telah ditukar secara permanen.');
                }
            }
        }

        resetButton.addEventListener('click', () => {
            if (audioInitialized) clickSynth.triggerAttackRelease("G4", "16n");
            initializeGame();
        });
        secretButton.addEventListener('click', toggleSecretMode);

        initializeGame();
    </script>
</body>
</html>
